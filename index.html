<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AirMock - 항공권 예매 체험 데모 v9</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="phone">
    <div class="demo-ribbon">DEMO ONLY · 실제 항공권/결제/탑승권이 아닙니다</div>
    <header>
      <div class="topbar">
        <div class="logo"><span class="logo-badge">✈️</span> AirMock</div>
        <div class="tag">Mobile Web</div>
      </div>
      <div class="hero">
        <h1>항공권 예매를<br/>체험해보세요</h1>
        <p>모바일 항공사 앱처럼 출/도착지 선택, 왕복 항공편, 기내식, 좌석 지정, 데모 탑승권까지 경험해보세요.</p>
      </div>
    </header>
    <div class="progress" id="progress"></div>
    <main id="app"></main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop" onclick="closeModalBackdrop(event)">
    <section class="sheet" id="modalSheet" role="dialog" aria-modal="true"></section>
  </div>

  <script src="data/seed-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
